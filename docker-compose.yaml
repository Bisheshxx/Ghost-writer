services:
  api:
    build:
      context: .
      target: builder
    ports:
      - "5001:6767"
    env_file:
      - ./src/config/.env
    volumes:
      - .:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    environment:
      - NODE_ENV=development
    # Ensure container dependencies match package.json before starting dev server
    command: sh -c "pnpm install --frozen-lockfile && pnpm run dev"

volumes:
  api_node_modules:
